<template>
    <lightning-card title="Active Contacts">
        <template if:true={isLoading}>
            <div class="slds-p-around_medium">
                <lightning-spinner alternative-text="Loading contacts"></lightning-spinner>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-p-around_medium slds-text-color_error">
                {errorMessage}
            </div>
        </template>

        <template if:true={hasContacts}>
            <lightning-datatable
                key-field="Id"
                data={contacts}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </template>

        <template if:false={hasContacts}>
            <div class="slds-p-around_medium slds-text-color_weak">
                No active contacts found.
            </div>
        </template>
    </lightning-card>
</template>
